version: '3'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 22181:2181

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    # environment:
      #MONGO_INITDB_ROOT_USERNAME: admin
      #MONGO_INITDB_ROOT_PASSWORD: password123 
    # Bỏ phần environment (User/Pass) để tránh lỗi keyFile khi chạy Replica Set
    #command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
  
  #Giả lập dữ liệu & Đẩy vào Kafka
  data_ingestion:
    build:
      context: ../  # Trỏ ra thư mục gốc để đọc được Dockerfile và thư mục data
      dockerfile: Dockerfile.data_ingestion
    container_name: bot_simulator
    depends_on:
      - kafka  # Đợi Kafka khởi động xong mới chạy Bot
    environment:
      # Truyền địa chỉ mạng nội bộ của Kafka vào cho script Python
      - KAFKA_BROKER=kafka:29092

  # Spark Streaming xử lý dữ liệu 
  stream_processing:
    build:
      context: ../
      dockerfile: Dockerfile.stream_processing
    container_name: service_spark_processor
    depends_on:
      - kafka
      - redis
    environment:
      - KAFKA_BROKER=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  # Thuật toán GA tìm đường
  route_optimization:
    build:
      context: ../
      dockerfile: Dockerfile.route_optimization
    container_name: service_ga_optimizer
    depends_on:
      - kafka
      - redis
      - mongodb
    environment:
      - KAFKA_BROKER=kafka:29092
      - REDIS_HOST=redis
      - MONGO_URI=mongodb://mongodb:27017/

  # Backend Socket.io
  dashboard_backend:
    build:
      context: ../
      dockerfile: Dockerfile.backend
    container_name: service_dashboard_backend
    depends_on:
      - redis
      - mongodb
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=redis
      - MONGO_URI=mongodb://mongodb:27017/
      - PORT=5000

  # Frontend ReactJS (Dashboard)
  dashboard_frontend:
    build:
      context: ../
      dockerfile: Dockerfile.frontend
    container_name: service_dashboard_frontend
    depends_on:
      - dashboard_backend
    ports:
      - "5173:5173"
    environment:
      # Báo cho frontend biết API Backend nằm ở đâu
      - VITE_API_URL=http://localhost:5000